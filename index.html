        // =========================================================================

        let scriptsData = [];
        let scriptAtivo = null;

        const searchInput = document.getElementById('searchInput');
        const listaScripts = document.getElementById('listaScripts');
        const statusContador = document.getElementById('statusContador');
        
        const scriptVazio = document.getElementById('scriptVazio');
        const scriptConteudo = document.getElementById('scriptConteudo');
        const badgePasta = document.getElementById('badgePasta');
        const tituloScript = document.getElementById('tituloScript');
        const refScript = document.getElementById('refScript');
        const ticketScript = document.getElementById('ticketScript');
        const textoScriptDiv = document.getElementById('textoScript');
        const btnCopiar = document.getElementById('btnCopiar');

        // Limpa as tags 
        function limparTagsFonte(texto) {
            return texto.replace(/\\s*/g, '');
        }

        function processarTXT(textoRaw) {
            scriptsData = [];
            let texto = limparTagsFonte(textoRaw);
            
            const blocos = texto.split(/=====\s*SCRIPT\s*\d+\s*=====/).filter(b => b.trim().length > 0);

            blocos.forEach(bloco => {
                const linhas = bloco.trim().split('\n');
                let scriptObj = { ref: '', ticket: '', pasta: '', titulo: '', status: '', texto: '' };
                let comecouCorpo = false;
                let linhasCorpo = [];

                linhas.forEach(linha => {
                    if (!comecouCorpo) {
                        if (linha.startsWith('Referência:')) scriptObj.ref = linha.replace('Referência:', '').trim();
                        else if (linha.startsWith('Ticket:')) scriptObj.ticket = linha.replace('Ticket:', '').trim();
                        else if (linha.startsWith('Pasta:')) scriptObj.pasta = linha.replace('Pasta:', '').trim();
                        else if (linha.startsWith('Título:')) scriptObj.titulo = linha.replace('Título:', '').trim();
                        else if (linha.startsWith('Status:')) scriptObj.status = linha.replace('Status:', '').trim();
                        else if (linha.trim() === '') { comecouCorpo = true; }
                    } else {
                        linhasCorpo.push(linha);
                    }
                });

                scriptObj.texto = linhasCorpo.join('\n').trim();
                if (scriptObj.ref || scriptObj.titulo) {
                    scriptsData.push(scriptObj);
                }
            });

            renderizarLista(scriptsData);
        }

        function renderizarLista(dados) {
            listaScripts.innerHTML = '';
            statusContador.innerText = `${dados.length} script(s) carregado(s)`;

            if (dados.length === 0) {
                listaScripts.innerHTML = '<p class="text-gray-400 text-center mt-10 text-sm">Nenhum resultado encontrado.</p>';
                return;
            }

            dados.forEach(script => {
                const div = document.createElement('div');
                div.className = 'p-3 mb-2 border rounded cursor-pointer hover:bg-blue-50 transition bg-white border-gray-200';
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="font-bold text-blue-700">#${script.ref}</span>
                        <span class="text-xs text-gray-400 truncate max-w-[150px]">${script.pasta}</span>
                    </div>
                    <div class="text-sm text-gray-700 mt-1 line-clamp-2">${script.titulo}</div>
                `;
                div.onclick = () => exibirScript(script);
                listaScripts.appendChild(div);
            });
        }

        function exibirScript(script) {
            scriptAtivo = script;
            scriptVazio.classList.add('hidden');
            scriptConteudo.classList.remove('hidden');
            scriptConteudo.classList.add('flex');

            badgePasta.innerText = script.pasta || "Sem Pasta";
            tituloScript.innerText = script.titulo || "Sem Título";
            refScript.innerText = script.ref || "N/A";
            ticketScript.innerText = script.ticket || "N/A";
            textoScriptDiv.innerText = script.texto;
        }

        searchInput.addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const filtrados = scriptsData.filter(s => 
                s.ref.toLowerCase().includes(termo) || 
                s.titulo.toLowerCase().includes(termo) ||
                s.texto.toLowerCase().includes(termo)
            );
            renderizarLista(filtrados);
        });

        btnCopiar.addEventListener('click', () => {
            if (!scriptAtivo) return;
            navigator.clipboard.writeText(scriptAtivo.texto).then(() => {
                const textoOriginal = btnCopiar.innerHTML;
                btnCopiar.innerHTML = '<span>✅ Copiado!</span>';
                btnCopiar.classList.replace('bg-green-600', 'bg-blue-600');
                btnCopiar.classList.replace('hover:bg-green-500', 'hover:bg-blue-500');
                
                setTimeout(() => {
                    btnCopiar.innerHTML = textoOriginal;
                    btnCopiar.classList.replace('bg-blue-600', 'bg-green-600');
                    btnCopiar.classList.replace('hover:bg-blue-500', 'hover:bg-green-500');
                }, 2000);
            });
        });

        // Inicializa processando os dados embutidos na variável DADOS_EMBUTIDOS assim que a página carrega
        window.onload = () => {
            processarTXT(DADOS_EMBUTIDOS);
        };
    </script>
